<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1A1714" />
    <meta name="description" content="AURUM Luxury Boutique — Curating the world's finest jewellery, timepieces, accessories and fragrances." />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
            href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap"
            rel="stylesheet"
    />

    <title>AURUM — Luxury Boutique</title>

    <style>
        /* Prevent flash of unstyled content */
        body { margin: 0; background: #1A1714; }
    </style>

    <!--
      Theme pre-hydration script — runs before React mounts so the
      correct theme (light/dark) is applied on the very first paint,
      preventing a "flash of wrong theme" on reload.
    -->
    <script>
        (function () {
            try {
                var saved = localStorage.getItem('aurum_theme');
                var theme = saved === 'light' || saved === 'dark'
                    ? saved
                    : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) { /* localStorage unavailable — default light applies */ }
        })();
    </script>
</head>
<body>
<noscript>You need to enable JavaScript to run this app.</noscript>
<div id="root"></div>
</body>
</html>
